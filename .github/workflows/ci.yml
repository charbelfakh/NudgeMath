# CI is fully offline by design: no ANTHROPIC_API_KEY. Generation and judge are mocked in tests.
# The deterministic gate (pytest), not the LLM-judge, is what blocks the build — consistent with Step 4.

name: CI

on:
  push:
  pull_request:

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest -q

  schema:
    name: SDL drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt
      - run: pip install -r requirements.txt
      - name: Re-export schema and diff against committed SDL
        run: |
          python -m hint_engine.api.export_schema > /tmp/schema.graphql
          diff -u schema.graphql /tmp/schema.graphql

  frontend:
    name: Frontend codegen, build, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install, codegen, verify generated output is committed
        working-directory: frontend
        run: |
          npm ci
          npm run codegen
          git diff --exit-code src/generated/
      - name: Build and test
        working-directory: frontend
        run: |
          npm run build
          npm test
